apiVersion: skaffold/v4beta7
kind: Config
build:
  artifacts:
    - image: identity-service
      context: identity-service
      docker:
        dockerfile: src/main/docker/Dockerfile.jvm
    - image: frontend
      context: frontend
      docker:
        dockerfile: Dockerfile
  local:
    push: false
manifests:
  rawYaml:
    # 1. Skaffold automatically installs the NGINX engine into the cluster
    - https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/kind/deploy.yaml
    # 2. Skaffold applies your database, Java app, and the Ingress rules we just wrote
    - k8s/*.yaml
deploy:
  kubectl: { }
portForward:
  # 3. Skaffold opens ONE door: Port 8080 on your PC routes straight into NGINX
  - resourceType: Service
    resourceName: ingress-nginx-controller
    namespace: ingress-nginx
    port: 80
    localPort: 8080
  # Keep Postgres forwarded so you can still use your database GUI
  - resourceType: Service
    resourceName: postgres-service
    namespace: default
    port: 5432
    localPort: 5432
