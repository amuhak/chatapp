apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-auth-service
  template:
    metadata:
      labels:
        app: redis-auth-service
    spec:
      containers:
        - name: redis-auth-service
          image: redis:8-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-auth-service
spec:
  selector:
    app: redis-auth-service
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
---
